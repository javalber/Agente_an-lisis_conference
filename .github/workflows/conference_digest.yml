name: Conference call digest

# ---------------------------------------------------------------------------
# Disparadores:
#   - schedule (cron): horarios del usuario 17:00 / 19:00 / 21:00 / 23:00 en
#     GMT-5 (sin horario de verano). GitHub Actions usa SIEMPRE UTC, así que se
#     convierte sumando 5 horas:
#        17:00 GMT-5 -> 22:00 UTC
#        19:00 GMT-5 -> 00:00 UTC
#        21:00 GMT-5 -> 02:00 UTC
#        23:00 GMT-5 -> 04:00 UTC
#     => minuto 0 de las horas UTC 22, 0, 2, 4.
#   - workflow_dispatch: ejecución manual desde la pestaña Actions (para probar).
#
# NOTA: el cron de GitHub no es exacto al minuto; puede retrasarse algunos
# minutos en horas de mucha carga. Para este caso (no es tiempo real) es OK.
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: "0 22,0,2,4 * * *"
  workflow_dispatch:

# Evita que dos ejecuciones se solapen (el estado vive en Gmail).
concurrency:
  group: conference-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # --- Secrets (configurar en Settings > Secrets and variables > Actions) ---
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # --- Configuración no sensible ---
          PROCESSED_LABEL: procesado
          SUBJECT_PREFIX: "Resumen conference call –"
          MODEL_PROVIDER: anthropic
          MODEL_NAME: claude-sonnet-4-6

          # Selección: resumir Presentación + Informe + Excel, solo en inglés;
          # reenviar los 7 adjuntos originales.
          SUMMARIZE_ROLES: presentation,report,excel
          SUMMARIZE_LANGUAGE: en
          FORWARD_ATTACHMENTS: all
          MAX_CONTENT_CHARS: "400000"

          # STUB_MODE=true -> resúmenes falsos, sin tocar el modelo.
          # FASE 3: cambiar a "false" para activar las llamadas reales de IA
          # (requiere el secret ANTHROPIC_API_KEY).
          STUB_MODE: "false"
        run: python main.py
